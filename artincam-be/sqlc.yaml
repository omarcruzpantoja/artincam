version: "2"
sql:
  - engine: "sqlite"
    schema: "./src/db/schema.sql"
    queries: "./src/db/queries/"
    gen:
      go:
        package: "qx"
        out: "./src/db/qx"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_exported_queries: true
